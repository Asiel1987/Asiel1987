name: CI

on:
  push:
    branches:
      - main
      - "claude/*"
  pull_request:
    branches:
      - main
      - "claude/*"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Frontend build check
  # ---------------------------------------------------------------------------
  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # Job 2 — Backend tests (with real Postgres + Redis)
  # ---------------------------------------------------------------------------
  backend-check:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: asiel_farm_test
          POSTGRES_USER: asiel
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U asiel -d asiel_farm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://asiel:test@localhost:5432/asiel_farm_test
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: test-secret
      NODE_ENV: test
      PORT: 3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Start backend server
        run: node src/index.js &

      - name: Wait for backend health endpoint
        run: npx wait-on http://localhost:3001/health --timeout 30000

      - name: Run backend tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Job 3 — End-to-end tests (Playwright)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build frontend for preview
        run: npm run build

      - name: Serve built frontend on port 4173
        run: npx serve dist --listen 4173 &

      - name: Run Playwright e2e tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:4173
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
